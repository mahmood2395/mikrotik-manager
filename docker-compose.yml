
services:

  # ---------------------------------------------------------------
  # Nginx — web server
  # Receives HTTP requests and forwards PHP files to app container
  # ---------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # Mount your app code so Nginx can serve static files directly
      - .:/var/www
      # Mount your custom Nginx config
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # ---------------------------------------------------------------
  # App — PHP-FPM (Laravel)
  # Runs the actual Laravel application
  # ---------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount code for local development so changes reflect immediately
      # In production you remove this and rely on the built image
      - .:/var/www
      - /var/www/vendor  # keep vendor from the image, don't overwrite with local
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-mikrotik_manager}
      - DB_USERNAME=${DB_USERNAME:-psql}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis  # use redis for async jobs
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    depends_on:
      - db
      - redis

  # ---------------------------------------------------------------
  # Queue Worker — runs Laravel jobs in the background
  # This is what processes async MikroTik commands
  # It uses the same image as app but runs a different command
  # ---------------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    # Override the default CMD to run the queue worker instead of PHP-FPM
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-mikrotik_manager}
      - DB_USERNAME=${DB_USERNAME:-psql}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # ---------------------------------------------------------------
  # PostgreSQL — stores routers, command logs, scripts
  # ---------------------------------------------------------------
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=${DB_DATABASE:-mikrotik_manager}
      - POSTGRES_USER=${DB_USERNAME:-psql}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ---------------------------------------------------------------
  # Redis — handles queues and caching
  # Fast in-memory store — Laravel jobs are pushed here
  # and the queue worker picks them up
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
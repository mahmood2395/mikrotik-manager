server {
    # Listen on port 80
    listen 80;

    # The root is Laravel's public folder — this is important
    # Laravel's index.php lives here and all requests go through it
    root /var/www/public;
    index index.php index.html;

    # Log locations inside the container
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        # Try to serve the file directly, then as a directory,
        # otherwise pass to index.php (Laravel's front controller)
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Pass PHP files to PHP-FPM running in the app container
        # "app" is the service name in docker-compose — Docker resolves it automatically
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files like .env
    location ~ /\.(?!well-known).* {
        deny all;
    }
}